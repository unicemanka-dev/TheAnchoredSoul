<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anchored Soul</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream-50: #fefdfb;
            --cream-100: #fdfaf3;
            --cream-200: #f5f1e6;
            --deepblue-900: #1a2a3a;
            --deepblue-800: #2c3e50;
            --gold-500: #d4af37;
            --gold-600: #b8962e;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        body { background-color: var(--cream-100); color: var(--deepblue-900); overflow-x: hidden; }

        .font-serif { font-family: 'Playfair Display', serif; }

        .container { max-width: 480px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 80px; }

        .page { display: none; padding: 24px; animation: fadeIn 0.3s ease-in-out; }
        .page.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Card Styles */
        .card { background: var(--white); border-radius: 20px; padding: 24px; border: 1px solid var(--cream-200); box-shadow: 0 4px 20px rgba(0,0,0,0.03); margin-bottom: 20px; }

        /* Buttons */
        .btn-primary { 
            background: var(--gold-500); color: var(--deepblue-900); border: none; 
            padding: 14px; border-radius: 12px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.2s; 
        }
        .btn-primary:active { transform: scale(0.98); }

        /* Timer */
        .timer-circle {
            width: 200px; height: 200px; border-radius: 50%; border: 4px solid var(--cream-200);
            margin: 40px auto; display: flex; align-items: center; justify-content: center;
            font-size: 3rem; font-weight: 300; position: relative;
        }

        /* Chat */
        #chat-window { height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding: 10px; }
        .msg { max-width: 80%; padding: 12px 16px; border-radius: 15px; font-size: 0.9rem; }
        .msg.bot { background: var(--cream-200); align-self: flex-start; border-bottom-left-radius: 2px; }
        .msg.user { background: var(--deepblue-900); color: white; align-self: flex-end; border-bottom-right-radius: 2px; }

        /* Navigation */
        nav { 
            position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); 
            display: flex; justify-content: space-around; padding: 12px; border-top: 1px solid var(--cream-200);
            max-width: 480px; margin: 0 auto;
        }
        .nav-btn { background: none; border: none; color: #a0aec0; cursor: pointer; display: flex; flex-direction: column; align-items: center; font-size: 10px; }
        .nav-btn.active { color: var(--gold-600); }
        
        .whatsapp-float {
            position: fixed; bottom: 85px; right: 20px; background: #25D366; color: white;
            width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2); text-decoration: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div class="container">
    <section id="landing" class="page active" style="text-align: center; padding-top: 60px;">
        <h1 class="font-serif" style="font-size: 2.5rem; margin-bottom: 10px;">The Anchored Soul</h1>
        <p class="font-serif" style="font-style: italic; opacity: 0.7;">Stability in a distracted world.</p>
        <div class="card" style="margin-top: 40px;">
            <p style="margin-bottom: 20px;">Ready to anchor your soul?</p>
            <input type="text" id="user-name" placeholder="Enter your name" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 15px;">
            <button class="btn-primary" onclick="startApp()">Begin Journey</button>
        </div>
    </section>

    <section id="home" class="page">
        <h2 class="font-serif" id="greeting">Welcome</h2>
        <div class="card" style="background: var(--cream-200); margin-top: 20px;">
            <p class="font-serif" style="font-style: italic; font-size: 1.1rem;">"We have this hope as an anchor for the soul, firm and secure."</p>
            <p style="font-size: 12px; margin-top: 10px; font-weight: 600;">HEBREWS 6:19</p>
        </div>
        <div class="card" style="display: flex; align-items: center; gap: 15px; cursor: pointer;" onclick="navigate('repair')">
            <i data-lucide="sparkles" style="color: var(--gold-600)"></i>
            <div>
                <h4 style="margin: 0;">Instant Repair</h4>
                <p style="font-size: 12px; opacity: 0.7;">Quick spiritual realignment</p>
            </div>
        </div>
    </section>

    <section id="meditate" class="page">
        <h2 class="font-serif">Be Still</h2>
        <div class="timer-circle" id="timer-display">05:00</div>
        <div style="display: flex; justify-content: center; gap: 20px;">
            <button class="btn-primary" id="timer-btn" onclick="toggleTimer()" style="width: 60px; height: 60px; border-radius: 50%;">
                <i data-lucide="play"></i>
            </button>
            <button onclick="resetTimer()" style="background: none; border: none; cursor: pointer;">
                <i data-lucide="rotate-ccw"></i>
            </button>
        </div>
    </section>

    <section id="repair" class="page">
        <h2 class="font-serif" style="margin-bottom: 20px;">Soul Companion</h2>
        <div class="card">
            <div id="chat-window">
                <div class="msg bot">I am here. What is weighing on your heart?</div>
            </div>
            <div style="display: flex; gap: 8px; margin-top: 15px;">
                <input type="text" id="chat-input" placeholder="Type a feeling (e.g. Anxious, Tired)..." style="flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #eee;">
                <button onclick="handleChat()" style="background: var(--gold-500); border: none; padding: 10px; border-radius: 8px; color: white;">
                    <i data-lucide="send"></i>
                </button>
            </div>
        </div>
    </section>

    <nav id="bottom-nav" style="display: none;">
        <button class="nav-btn active" onclick="navigate('home')"><i data-lucide="home"></i>Home</button>
        <button class="nav-btn" onclick="navigate('meditate')"><i data-lucide="wind"></i>Meditate</button>
        <button class="nav-btn" onclick="navigate('repair')"><i data-lucide="sparkles"></i>Repair</button>
    </nav>

    <a href="https://wa.me/237673202653" class="whatsapp-float" target="_blank">
        <i data-lucide="message-circle"></i>
    </a>
</div>

<script>
    // Initialize Icons
    lucide.createIcons();

    // App State
    let userName = "";
    let timeLeft = 300;
    let timerRunning = false;
    let timerInterval;

    // Local Knowledge Base (The "API" replacement)
    const responses = {
        anxious: "Take a deep breath. 'Cast all your anxiety on Him because He cares for you.' (1 Peter 5:7). Try a 5-minute meditation now.",
        tired: "It's okay to rest. Even the Creator rested on the seventh day. Turn off your notifications for 20 minutes.",
        sad: "Your feelings are valid. 'The Lord is close to the brokenhearted.' (Psalm 34:18). You are not alone.",
        angry: "Pause before you speak. Breathe. Let the heat dissipate before you address the situation.",
        fear: "Fear is often a liar. Focus on one small thing you can control right now.",
        default: "I hear you. Take a moment to sit in silence and invite peace into your current space."
    };

    function startApp() {
        const input = document.getElementById('user-name');
        userName = input.value || "Friend";
        document.getElementById('greeting').innerText = `Welcome, ${userName}`;
        document.getElementById('bottom-nav').style.display = 'flex';
        navigate('home');
    }

    function navigate(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText.toLowerCase().includes(pageId));
        });
    }

    // Timer Logic
    function toggleTimer() {
        const btn = document.getElementById('timer-btn');
        if (timerRunning) {
            clearInterval(timerInterval);
            btn.innerHTML = '<i data-lucide="play"></i>';
        } else {
            timerInterval = setInterval(() => {
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    alert("Time is up. Peace be with you.");
                    return;
                }
                timeLeft--;
                updateTimerDisplay();
            }, 1000);
            btn.innerHTML = '<i data-lucide="pause"></i>';
        }
        timerRunning = !timerRunning;
        lucide.createIcons();
    }

    function resetTimer() {
        clearInterval(timerInterval);
        timerRunning = false;
        timeLeft = 300;
        updateTimerDisplay();
        document.getElementById('timer-btn').innerHTML = '<i data-lucide="play"></i>';
        lucide.createIcons();
    }

    function updateTimerDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        document.getElementById('timer-display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
    }

    // Local Chat Logic
    function handleChat() {
        const input = document.getElementById('chat-input');
        const chatWindow = document.getElementById('chat-window');
        const userText = input.value.trim().toLowerCase();

        if (!userText) return;

        // Add User Message
        chatWindow.innerHTML += `<div class="msg user">${input.value}</div>`;
        input.value = "";

        // Determine Response
        let reply = responses.default;
        for (const [key, value] of Object.entries(responses)) {
            if (userText.includes(key)) {
                reply = value;
                break;
            }
        }

        // Add Bot Message with slight delay
        setTimeout(() => {
            chatWindow.innerHTML += `<div class="msg bot">${reply}</div>`;
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }, 600);
    }
</script>

</body>
</html>
