<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anchored Soul | From Noise to Stillness</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-50': '#FFFFFF',
                        'cream-100': '#FDFBF7',
                        'cream-200': '#F5F2ED',
                        'gold-400': '#E5C158',
                        'gold-500': '#D4AF37',
                        'gold-600': '#B5952F',
                        'deepblue-800': '#112240',
                        'deepblue-900': '#0A192F',
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FDFBF7; color: #0A192F; -webkit-tap-highlight-color: transparent; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        // --- Shared Components ---
        const Icon = ({ name, className = "", size = 24 }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        // --- 1. HOME & REGISTRATION COMPONENT ---
        function Home({ onNavigate }) {
            const [user, setUser] = useState(JSON.parse(localStorage.getItem('anchored_soul_user')));
            const [formData, setFormData] = useState({ name: '', email: '' });

            const handleJoin = (e) => {
                e.preventDefault();
                localStorage.setItem('anchored_soul_user', JSON.stringify(formData));
                setUser(formData);
            };

            if (!user) {
                return (
                    <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="px-6 py-12 max-w-md mx-auto">
                        <div className="text-center mb-10">
                            <div className="w-16 h-16 bg-deepblue-900 text-gold-500 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl">
                                <Icon name="anchor" size={32} />
                            </div>
                            <h1 className="font-serif text-4xl font-semibold mb-4 leading-tight">Quiet the Noise. <br/><span className="text-gold-500 italic">Find Your Soul.</span></h1>
                            <p className="text-deepblue-800/70 text-lg leading-relaxed mb-8">
                                The Anchored Soul is a digital sanctuary for those drowning in distraction. Reclaim your focus, heal your relationships, and find spiritual clarity.
                            </p>
                        </div>

                        <form onSubmit={handleJoin} className="bg-white p-8 rounded-[40px] shadow-xl border border-cream-200 space-y-4">
                            <h2 className="font-serif text-2xl text-center mb-2">Join the 21-Day Journey</h2>
                            <p className="text-xs text-center text-deepblue-800/50 uppercase tracking-widest mb-6">Begin your transformation</p>
                            <input required type="text" placeholder="Full Name" className="w-full px-5 py-4 rounded-2xl bg-cream-100 outline-none focus:ring-2 focus:ring-gold-500 transition-all" 
                                onChange={e => setFormData({...formData, name: e.target.value})} />
                            <input required type="email" placeholder="Email Address" className="w-full px-5 py-4 rounded-2xl bg-cream-100 outline-none focus:ring-2 focus:ring-gold-500 transition-all" 
                                onChange={e => setFormData({...formData, email: e.target.value})} />
                            <button type="submit" className="w-full py-4 bg-deepblue-900 text-white rounded-full font-bold shadow-lg hover:scale-[1.02] active:scale-[0.98] transition-all">
                                Get Started
                            </button>
                        </form>
                    </motion.div>
                );
            }

            return (
                <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="pb-24 px-6 pt-12 max-w-md mx-auto">
                    <header className="mb-10">
                        <h1 className="font-serif text-3xl font-semibold text-deepblue-900 mb-2">Welcome Back, {user.name.split(' ')[0]}</h1>
                        <p className="text-sm text-deepblue-800/70 italic font-serif">"We have this hope as an anchor for the soul..."</p>
                    </header>

                    <section className="bg-white rounded-[40px] p-8 shadow-sm border border-cream-200 mb-8 relative overflow-hidden">
                        <div className="absolute top-0 right-0 p-4 opacity-10"><Icon name="sun" size={64} /></div>
                        <p className="text-xs font-semibold text-gold-500 uppercase tracking-widest mb-2">Day 8 of 21</p>
                        <h2 className="text-2xl font-medium text-deepblue-900 mb-4">Deepening Stillness</h2>
                        <button onClick={() => onNavigate('meditate')} className="bg-deepblue-900 text-white rounded-2xl px-6 py-3 font-medium flex items-center gap-2">
                            Resume Practice <Icon name="arrow-right" size={16} />
                        </button>
                    </section>

                    <div className="grid grid-cols-2 gap-4">
                        <AreaCard title="Focus" icon="target" onClick={() => onNavigate('focus')} />
                        <AreaCard title="Clarity" icon="lightbulb" onClick={() => onNavigate('clarity')} />
                    </div>
                </motion.div>
            );
        }

        function AreaCard({ title, icon, onClick }) {
            return (
                <button onClick={onClick} className="bg-white rounded-3xl p-6 flex flex-col items-center shadow-sm border border-cream-200 hover:border-gold-500 transition-colors">
                    <Icon name={icon} className="text-gold-500 mb-3" size={28} />
                    <span className="font-serif text-lg">{title}</span>
                </button>
            );
        }

        // --- 2. INSTANT REPAIR (CHATBOT) ---
        function InstantRepair({ onClose }) {
            const [messages, setMessages] = useState([
                { role: 'bot', text: 'Peace be with you. I am your Instant Repair guide. What is weighing on your soul right now?' }
            ]);
            const [input, setInput] = useState('');
            const chatEndRef = useRef(null);

            useEffect(() => { chatEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const getResponse = (msg) => {
                const low = msg.toLowerCase();
                if (low.includes('stress') || low.includes('anxious')) return "I understand. Let's ground you. Take 3 deep breaths and repeat: 'God is my refuge and strength.' Would you like a 1-minute breathing exercise?";
                if (low.includes('focus') || low.includes('distract')) return "The world is loud, but you can be still. Try a 10-minute Focus Sprint. Silence all notifications first.";
                if (low.includes('hurt') || low.includes('broken')) return "Healing takes time. Forgiveness isn't forgetting; it's releasing the weight. Why not visit the Relationships tab?";
                return "You are not alone in this. Every soul needs an anchor. Shall we start a meditation to quiet the mind?";
            };

            const handleSend = () => {
                if (!input.trim()) return;
                const userMsg = { role: 'user', text: input };
                setMessages([...messages, userMsg]);
                setInput('');
                setTimeout(() => {
                    setMessages(prev => [...prev, { role: 'bot', text: getResponse(input) }]);
                }, 800);
            };

            return (
                <div className="fixed inset-0 z-[60] glass flex flex-col">
                    <div className="p-6 border-b border-cream-200 flex justify-between items-center bg-white">
                        <div><h2 className="font-serif text-2xl">Instant Repair</h2><p className="text-[10px] uppercase font-bold text-gold-500 tracking-tighter">Instant Relief Assistant</p></div>
                        <button onClick={onClose} className="p-2 bg-cream-100 rounded-full"><Icon name="x" /></button>
                    </div>
                    <div className="flex-1 overflow-y-auto p-6 space-y-4 no-scrollbar">
                        {messages.map((m, i) => (
                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                <div className={`max-w-[85%] p-4 rounded-2xl ${m.role === 'user' ? 'bg-gold-500 text-white' : 'bg-white shadow-sm border border-cream-200 text-deepblue-900'}`}>
                                    {m.text}
                                </div>
                            </div>
                        ))}
                        <div ref={chatEndRef} />
                    </div>
                    <div className="p-6 bg-white border-t border-cream-200 flex gap-2">
                        <input value={input} onChange={e => setInput(e.target.value)} onKeyPress={e => e.key === 'Enter' && handleSend()} 
                            placeholder="I feel overwhelmed..." className="flex-1 bg-cream-100 px-4 py-3 rounded-xl outline-none text-sm" />
                        <button onClick={handleSend} className="p-3 bg-deepblue-900 text-white rounded-xl"><Icon name="send" size={20}/></button>
                    </div>
                </div>
            );
        }

        // --- 3. STILLNESS CENTER ---
        function Meditate() {
            const [isActive, setIsActive] = useState(false);
            const [timeLeft, setTimeLeft] = useState(300);

            useEffect(() => {
                let interval = null;
                if (isActive && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0) setIsActive(false);
                return () => clearInterval(interval);
            }, [isActive, timeLeft]);

            return (
                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="pb-24 px-6 pt-12 max-w-md mx-auto text-center">
                    <h1 className="font-serif text-3xl mb-8">Stillness</h1>
                    <div className="w-64 h-64 bg-white rounded-full mx-auto flex items-center justify-center border-8 border-cream-200 shadow-2xl relative mb-12">
                        <motion.div animate={{ scale: isActive ? [1, 1.15, 1] : 1 }} transition={{ repeat: Infinity, duration: 4 }} className="absolute inset-2 border-2 border-gold-500/20 rounded-full" />
                        <div className="text-5xl font-mono">{Math.floor(timeLeft/60)}:{(timeLeft%60).toString().padStart(2,'0')}</div>
                    </div>
                    <div className="flex justify-center gap-6">
                        <button onClick={() => setIsActive(!isActive)} className="w-16 h-16 bg-deepblue-900 text-white rounded-full flex items-center justify-center shadow-lg">
                            <Icon name={isActive ? "pause" : "play"} />
                        </button>
                        <button onClick={() => {setIsActive(false); setTimeLeft(300);}} className="w-16 h-16 bg-cream-200 rounded-full flex items-center justify-center">
                            <Icon name="rotate-ccw" />
                        </button>
                    </div>
                </motion.div>
            );
        }

        // --- 4. FOCUS HUB ---
        function Focus() {
            const [tasks, setTasks] = useState([
                { id: 1, text: 'Morning Prayer & Silence', done: false },
                { id: 2, text: 'Deep Work Session (90min)', done: false },
                { id: 3, text: 'Digital Sabbath Hour', done: false }
            ]);

            return (
                <div className="pb-24 px-6 pt-12 max-w-md mx-auto">
                    <h1 className="font-serif text-3xl mb-8">Focus Hub</h1>
                    <div className="space-y-4">
                        {tasks.map(t => (
                            <div key={t.id} onClick={() => setTasks(tasks.map(x => x.id === t.id ? {...x, done: !x.done} : x))} 
                                 className={`bg-white p-5 rounded-3xl flex items-center gap-4 border cursor-pointer transition-all ${t.done ? 'opacity-40 grayscale border-cream-200' : 'border-gold-500/20 shadow-sm'}`}>
                                <Icon name={t.done ? "check-circle" : "circle"} className={t.done ? "text-gold-500" : "text-cream-300"} />
                                <span className={t.done ? "line-through" : "font-medium"}>{t.text}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- 5. CLARITY & PURPOSE ---
        function Clarity() {
            return (
                <div className="pb-24 px-6 pt-12 max-w-md mx-auto">
                    <h1 className="font-serif text-3xl mb-8">Clarity</h1>
                    <div className="bg-deepblue-900 text-white p-10 rounded-[40px] shadow-xl relative overflow-hidden mb-8">
                        <div className="absolute top-0 right-0 w-32 h-32 bg-gold-500/10 rounded-full blur-3xl"></div>
                        <h2 className="font-serif text-2xl mb-4 italic">"Where there is no vision, the people perish."</h2>
                        <button className="bg-white text-deepblue-900 px-6 py-3 rounded-2xl font-bold text-sm">Start Vision Map</button>
                    </div>
                    <div className="bg-white p-6 rounded-3xl border border-cream-200">
                        <h4 className="text-xs font-bold text-gold-500 uppercase mb-4">Journal Prompts</h4>
                        <div className="space-y-4 text-sm italic text-deepblue-800/70">
                            <p>"What is the loudest noise in my soul right now?"</p>
                            <p>"If I had total silence, what would I hear God saying?"</p>
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP ---
        function App() {
            const [tab, setTab] = useState('home');
            const [showBot, setShowBot] = useState(false);

            const renderContent = () => {
                switch (tab) {
                    case 'home': return <Home key="h" onNavigate={setTab} />;
                    case 'meditate': return <Meditate key="m" />;
                    case 'focus': return <Focus key="f" />;
                    case 'clarity': return <Clarity key="c" />;
                    default: return <Home onNavigate={setTab} />;
                }
            };

            return (
                <div className="min-h-screen bg-cream-100">
                    <AnimatePresence mode="wait">{renderContent()}</AnimatePresence>
                    
                    {/* Instant Repair Toggle */}
                    <button onClick={() => setShowBot(true)} className="fixed bottom-28 right-6 px-6 py-4 bg-gold-500 text-white rounded-full shadow-2xl font-bold flex items-center gap-2 hover:scale-105 transition-transform z-50">
                        <Icon name="zap" size={18} /> Instant Repair
                    </button>

                    {showBot && <InstantRepair onClose={() => setShowBot(false)} />}

                    {/* WhatsApp Support */}
                    <a href="https://wa.me/237673202653" target="_blank" className="fixed bottom-28 left-6 w-14 h-14 bg-[#25D366] text-white rounded-full flex items-center justify-center shadow-lg z-50">
                        <Icon name="message-circle" />
                    </a>

                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-cream-200 flex justify-around py-4 pb-8 z-40">
                        <NavBtn id="home" icon="home" active={tab==='home'} set={setTab}/>
                        <NavBtn id="meditate" icon="wind" active={tab==='meditate'} set={setTab}/>
                        <NavBtn id="focus" icon="target" active={tab==='focus'} set={setTab}/>
                        <NavBtn id="clarity" icon="compass" active={tab==='clarity'} set={setTab}/>
                    </nav>
                </div>
            );
        }

        const NavBtn = ({id, icon, active, set}) => (
            <button onClick={() => set(id)} className={`transition-all ${active ? 'text-gold-600' : 'text-deepblue-800/30'}`}>
                <Icon name={icon} />
            </button>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
