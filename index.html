<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Anchored Soul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <script>
        // Integrating your custom theme colors from ai_studio_code.css
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'cream-50': '#FFFFFF',
                        'cream-100': '#FDFBF7',
                        'cream-200': '#F5F2ED',
                        'gold-500': '#D4AF37',
                        'gold-600': '#B5952F',
                        'deepblue-800': '#112240',
                        'deepblue-900': '#0A192F',
                    },
                    fontFamily: {
                        serif: ['Cormorant Garamond', 'serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #FDFBF7; color: #0A192F; }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        // Dynamic Icon Component to replace lucide-react imports
        const Icon = ({ name, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- Home Component [cite: 80-83] ---
        function Home({ onNavigate }) {
            const today = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
            return (
                <motion.div initial={{ opacity: 0, y: 10 }} animate={{ opacity: 1, y: 0 }} className="pb-24 px-6 pt-12 max-w-md mx-auto">
                    <header className="mb-10 text-center">
                        <h1 className="font-serif text-3xl font-semibold text-deepblue-900 mb-2">The Anchored Soul</h1>
                        <p className="text-sm text-deepblue-800/70 italic font-serif">Bringing stability to the soul in a distracted world.</p>
                    </header>
                    <section className="bg-white rounded-3xl p-6 shadow-sm border border-cream-200">
                        <p className="text-xs font-semibold text-gold-500 uppercase tracking-widest mb-2">{today}</p>
                        <h2 className="text-xl font-medium text-deepblue-900 mb-4">Welcome back.</h2>
                        <div className="bg-cream-100 rounded-2xl p-4 mb-6 italic text-lg text-deepblue-900 font-serif">
                            "We have this hope as an anchor for the soul, firm and secure." 
                            <p className="text-xs text-deepblue-800/60 mt-2 not-italic font-sans uppercase">— Hebrews 6:19 (NIV)</p>
                        </div>
                        <button onClick={() => onNavigate('meditate')} className="w-full bg-deepblue-900 text-white rounded-xl py-3 font-medium">Start Today</button>
                    </section>
                </motion.div>
            );
        }

        // --- Meditate Component [cite: 54-59, 65-71] ---
        function Meditate() {
            const [isActive, setIsActive] = useState(false);
            const [timeLeft, setTimeLeft] = useState(300);
            useEffect(() => {
                let interval = null;
                if (isActive && timeLeft > 0) {
                    interval = setInterval(() => setTimeLeft(t => t - 1), 1000);
                } else if (timeLeft === 0) setIsActive(false);
                return () => clearInterval(interval);
            }, [isActive, timeLeft]);

            return (
                <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} className="pb-24 px-6 pt-12 max-w-md mx-auto">
                    <h1 className="font-serif text-3xl font-semibold mb-8 text-center">Meditation</h1>
                    <div className="bg-white rounded-3xl p-8 border border-cream-200 text-center shadow-sm">
                        <div className="text-5xl font-light mb-8">
                            {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
                        </div>
                        <div className="flex justify-center gap-4">
                            <button onClick={() => setIsActive(!isActive)} className="p-4 bg-deepblue-900 text-white rounded-full">
                                <Icon name={isActive ? "pause" : "play"} />
                            </button>
                            <button onClick={() => {setIsActive(false); setTimeLeft(300);}} className="p-4 bg-cream-100 rounded-full">
                                <Icon name="rotate-ccw" />
                            </button>
                        </div>
                    </div>
                </motion.div>
            );
        }

        // --- Focus Component [cite: 34-37, 42-46] ---
        function Focus() {
            const [tasks, setTasks] = useState([
                { id: 1, text: 'Read morning devotional', completed: false },
                { id: 2, text: 'Complete project proposal', completed: false }
            ]);
            return (
                <div className="pb-24 px-6 pt-12 max-w-md mx-auto">
                    <h1 className="font-serif text-3xl font-semibold mb-6">Focus</h1>
                    <div className="space-y-3">
                        {tasks.map(t => (
                            <div key={t.id} onClick={() => setTasks(tasks.map(x => x.id === t.id ? {...x, completed: !x.completed} : x))} 
                                 className="bg-white p-4 rounded-2xl flex items-center gap-4 border border-cream-200 cursor-pointer">
                                <Icon name={t.completed ? "check-circle-2" : "circle"} className={t.completed ? "text-gold-500" : "text-cream-300"} />
                                <span className={t.completed ? "line-through opacity-50" : ""}>{t.text}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        // --- Main App Controller [cite: 102-109, 113-120] ---
        function App() {
            const [activeTab, setActiveTab] = useState('home');

            const renderContent = () => {
                switch (activeTab) {
                    case 'home': return <Home onNavigate={setActiveTab} />;
                    case 'meditate': return <Meditate />;
                    case 'focus': return <Focus />;
                    case 'relationships': return <div className="pt-12 text-center font-serif text-2xl">Relationships Component</div>;
                    case 'clarity': return <div className="pt-12 text-center font-serif text-2xl">Clarity Component</div>;
                    default: return <Home onNavigate={setActiveTab} />;
                }
            };

            return (
                <div className="min-h-screen bg-cream-100 pb-safe">
                    <main>{renderContent()}</main>
                    
                    {/* Floating WhatsApp Support [cite: 1, 3] */}
                    <a href="https://wa.me/237673202653" target="_blank" className="fixed bottom-24 right-6 w-14 h-14 bg-[#25D366] text-white rounded-full flex items-center justify-center shadow-lg z-50">
                        <Icon name="message-circle" />
                    </a>

                    {/* Navigation [cite: 109] */}
                    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-cream-200 flex justify-around py-3 z-40">
                        {[
                            { id: 'home', icon: 'home', label: 'Home' },
                            { id: 'meditate', icon: 'play', label: 'Meditate' },
                            { id: 'focus', icon: 'target', label: 'Focus' },
                            { id: 'relationships', icon: 'users', label: 'Relate' },
                            { id: 'clarity', icon: 'lightbulb', label: 'Clarity' }
                        ].map(item => (
                            <button key={item.id} onClick={() => setActiveTab(item.id)} className={`flex flex-col items-center ${activeTab === item.id ? 'text-gold-600' : 'text-deepblue-800/40'}`}>
                                <Icon name={item.icon} />
                                <span className="text-[10px] mt-1 uppercase font-bold">{item.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
