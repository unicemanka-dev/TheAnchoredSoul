<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stability Journey Portal</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&display=swap');
        
        :root {
            --deep-blue-50: #eff6ff;
            --deep-blue-100: #dbeafe;
            --deep-blue-900: #1e3a8a;
            --soft-gold-400: #fbbf24;
            --light-purple-100: #f3e8ff;
            --light-purple-600: #9333ea;
        }

        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .font-serif { font-family: 'Playfair+Display', serif; }
        
        /* Custom Tailwind Color Extensions from your config */
        .bg-deep-blue-900 { background-color: var(--deep-blue-900); }
        .text-deep-blue-900 { color: var(--deep-blue-900); }
        .border-deep-blue-100 { border-color: var(--deep-blue-100); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- GLOBAL DATA (Consolidated from Files 1, 3, 4) ---
        const journeyMonths = [
            { month: "April", theme: "Stillness & Awareness", status: "completed" },
            { month: "May", theme: "Discipline & Focus", status: "current" },
            { month: "June", theme: "Emotional Healing", status: "upcoming" },
            { month: "July", theme: "Identity & Discovery", status: "upcoming" }
        ];

        const resources = [
            { id: 1, title: "The Power of Stillness in a Noisy World", type: "Article", category: "Stillness", icon: "file-text" },
            { id: 2, title: "Guided Meditation: Psalm 23", type: "Audio", category: "Stillness", icon: "headphones" },
            { id: 3, title: "Overcoming Digital Distractions", type: "Video", category: "Focus", icon: "play-circle" },
            { id: 5, title: "Healing from Past Hurts", type: "Video", category: "Relationships", icon: "play-circle" }
        ];

        // Helper to render Lucide icons in a React environment
        const LucideIcon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { lucide.createIcons(); }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        // --- COMPONENTS ---

        function Dashboard({ onNavigate }) {
            return (
                <div className="max-w-7xl mx-auto px-6 py-12">
                    <div className="flex flex-col md:flex-row justify-between items-end mb-12 gap-4">
                        <div>
                            <h1 className="text-4xl font-serif font-bold text-deep-blue-900 mb-2">Welcome back, Sarah</h1>
                            <p className="text-slate-600">Here is your progress on the journey to stability.</p>
                        </div>
                        <button onClick={() => onNavigate('soulcheck')} className="px-6 py-2 rounded-full bg-purple-100 text-purple-700 font-medium hover:bg-purple-200 transition-colors flex items-center gap-2">
                            <LucideIcon name="activity" /> Take Daily Soul Check
                        </button>
                    </div>

                    <div className="grid lg:grid-cols-3 gap-8">
                        <div className="lg:col-span-2 bg-white rounded-3xl p-8 border border-deep-blue-100 shadow-sm">
                            <h2 className="text-2xl font-serif font-semibold text-deep-blue-900 mb-8">Your 2026 Journey</h2>
                            <div className="space-y-6">
                                {journeyMonths.map((m, i) => (
                                    <div key={i} className="flex items-center gap-4">
                                        <div className={`w-10 h-10 rounded-full flex items-center justify-center ${m.status === 'completed' ? 'bg-green-100 text-green-600' : 'bg-blue-50 text-blue-500'}`}>
                                            <LucideIcon name={m.status === 'completed' ? 'check' : 'calendar'} />
                                        </div>
                                        <div>
                                            <p className="font-bold text-deep-blue-900">{m.month}</p>
                                            <p className="text-sm text-slate-500">{m.theme}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <div className="bg-deep-blue-900 rounded-3xl p-6 text-white h-fit">
                            <h3 className="font-serif text-xl mb-6">Recommended for You</h3>
                            <div className="bg-blue-800/50 p-4 rounded-2xl mb-4 border border-blue-700">
                                <span className="text-xs text-amber-400 font-bold uppercase">Stillness</span>
                                <p className="font-medium">Overcoming Morning Anxiety</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function ResourceLibrary() {
            const [search, setSearch] = useState("");
            const filtered = resources.filter(r => r.title.toLowerCase().includes(search.toLowerCase()));

            return (
                <div className="max-w-7xl mx-auto px-6 py-12">
                    <h1 className="text-4xl font-serif font-bold text-deep-blue-900 mb-8 text-center">Resource Library</h1>
                    <div className="mb-12 relative max-w-xl mx-auto">
                        <input 
                            type="text" 
                            placeholder="Search resources..." 
                            className="w-full pl-12 pr-4 py-3 rounded-2xl bg-white border border-deep-blue-100 shadow-sm focus:ring-2 focus:ring-amber-400 outline-none"
                            onChange={(e) => setSearch(e.target.value)}
                        />
                        <LucideIcon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                    </div>
                    <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {filtered.map(res => (
                            <div key={res.id} className="bg-white p-6 rounded-3xl border border-deep-blue-100 shadow-sm hover:shadow-md transition-shadow cursor-pointer">
                                <LucideIcon name={res.icon} className="text-amber-500 mb-4 w-8 h-8" />
                                <h3 className="text-lg font-bold text-deep-blue-900 mb-2">{res.title}</h3>
                                <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">{res.type}</span>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function SoulCheck({ onComplete }) {
            const [step, setStep] = useState(1);
            const [score, setScore] = useState(5);

            const handleNext = () => step < 3 ? setStep(step + 1) : onComplete();

            return (
                <div className="max-w-2xl mx-auto py-20 px-6">
                    <div className="bg-white rounded-[40px] p-12 border border-deep-blue-100 shadow-2xl text-center">
                        <LucideIcon name="activity" className="w-16 h-16 text-purple-600 mx-auto mb-6" />
                        <h2 className="text-3xl font-serif font-bold text-deep-blue-900 mb-2">Daily Soul Check</h2>
                        <div className="w-full bg-slate-100 h-2 rounded-full my-10 overflow-hidden">
                            <div className="bg-deep-blue-900 h-full transition-all duration-500" style={{width: `${(step/3)*100}%`}}></div>
                        </div>
                        <div className="min-h-[200px]">
                            {step === 1 && (
                                <div className="space-y-6">
                                    <h3 className="text-2xl font-medium text-deep-blue-900">How is your focus today?</h3>
                                    <input type="range" min="1" max="10" value={score} onChange={(e) => setScore(e.target.value)} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-deep-blue-900" />
                                    <div className="flex justify-between text-xs text-slate-400 font-bold"><span>DISTRACTED</span><span>FOCUSED</span></div>
                                </div>
                            )}
                            {step > 1 && <div className="py-10 text-slate-600 italic">"Be still, and know that I am God."</div>}
                        </div>
                        <button onClick={handleNext} className="w-full py-4 bg-deep-blue-900 text-white rounded-2xl font-bold mt-8 shadow-lg shadow-blue-900/20">
                            {step === 3 ? "Complete Check" : "Next Step"}
                        </button>
                    </div>
                </div>
            );
        }

        // --- MAIN APPLICATION SHELL ---

        function App() {
            const [page, setPage] = useState('dashboard');

            const renderContent = () => {
                switch(page) {
                    case 'resources': return <ResourceLibrary />;
                    case 'soulcheck': return <SoulCheck onComplete={() => setPage('dashboard')} />;
                    case 'community': return <div className="p-20 text-center"><h1 className="text-3xl font-serif">Community Forum</h1><p>Coming Soon</p></div>;
                    default: return <Dashboard onNavigate={setPage} />;
                }
            };

            return (
                <div className="min-h-screen">
                    <nav className="bg-white/80 backdrop-blur-md border-b border-deep-blue-100 py-4 px-8 flex justify-between items-center sticky top-0 z-50">
                        <h1 className="text-2xl font-serif font-bold text-deep-blue-900 tracking-tight">Stability</h1>
                        <div className="flex gap-8 text-sm font-bold text-slate-400">
                            {['dashboard', 'community', 'resources'].map(p => (
                                <button key={p} onClick={() => setPage(p)} 
                                    className={`uppercase tracking-widest hover:text-deep-blue-900 transition-colors ${page === p ? 'text-deep-blue-900' : ''}`}>
                                    {p}
                                </button>
                            ))}
                        </div>
                    </nav>
                    <main className="pb-20">{renderContent()}</main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
